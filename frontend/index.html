<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI-Bench - 大模型人格评测基准</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .number {
            font-size: 2.5em;
            font-weight: bold;
        }

        .stat-box .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f5f5f5;
            color: #667eea;
            font-weight: 600;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .type-badge.special {
            background: #ff6b6b;
            color: white;
        }

        .type-badge.normal {
            background: #51cf66;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 SBTI-Bench</h1>
            <p>大模型人格评测基准 - 排行榜与分类</p>
        </div>

        <div id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        async function loadResults() {
            try {
                const response = await fetch('../data/results.json');
                if (!response.ok) {
                    throw new Error('无法加载结果数据');
                }
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                document.getElementById('content').innerHTML =
                    `<div class="error">错误: ${error.message}<br>请确保已经运行评测并生成 data/results.json 文件</div>`;
            }
        }

        function displayResults(data) {
            const evaluations = data.evaluations || [];

            if (evaluations.length === 0) {
                document.getElementById('content').innerHTML =
                    '<div class="card empty">暂无评测数据<br><br>请运行评测脚本: python -m backend.evaluator "Model Name" "model-id"</div>';
                return;
            }

            // 统计数据
            const totalModels = evaluations.length;
            const typeCounts = {};
            evaluations.forEach(eval => {
                const type = eval.sbiti_type;
                typeCounts[type] = (typeCounts[type] || 0) + 1;
            });

            const uniqueTypes = Object.keys(typeCounts).length;

            // 生成HTML
            let html = `
                <div class="card">
                    <h2>📊 统计概览</h2>
                    <div class="stats">
                        <div class="stat-box">
                            <div class="number">${totalModels}</div>
                            <div class="label">已评测模型</div>
                        </div>
                        <div class="stat-box">
                            <div class="number">${uniqueTypes}</div>
                            <div class="label">SBTI类型分布</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>🏆 模型排行榜</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>模型名称</th>
                                <th>SBTI类型</th>
                                <th>中文名</th>
                                <th>匹配度</th>
                                <th>评测时间</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            evaluations.forEach((eval, index) => {
                const date = new Date(eval.evaluation_date).toLocaleString('zh-CN');
                const isSpecial = eval.is_special || false;
                const badgeClass = isSpecial ? 'special' : 'normal';

                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${eval.model_name}</strong><br><small>${eval.model_id}</small></td>
                        <td><span class="type-badge ${badgeClass}">${eval.sbiti_type}</span></td>
                        <td>${eval.chinese_name}</td>
                        <td>${eval.match_similarity}%</td>
                        <td><small>${date}</small></td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>

                <div class="card">
                    <h2>📈 SBTI类型分布</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>类型代码</th>
                                <th>中文名</th>
                                <th>模型数量</th>
                                <th>占比</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            // 按类型分组
            const typeGroups = {};
            evaluations.forEach(eval => {
                const type = eval.sbiti_type;
                if (!typeGroups[type]) {
                    typeGroups[type] = {
                        chineseName: eval.chinese_name,
                        count: 0,
                        isSpecial: eval.is_special
                    };
                }
                typeGroups[type].count++;
            });

            // 排序
            const sortedTypes = Object.entries(typeGroups).sort((a, b) => b[1].count - a[1].count);

            sortedTypes.forEach(([type, info]) => {
                const percentage = ((info.count / totalModels) * 100).toFixed(1);
                const badgeClass = info.isSpecial ? 'special' : 'normal';

                html += `
                    <tr>
                        <td><span class="type-badge ${badgeClass}">${type}</span></td>
                        <td>${info.chineseName}</td>
                        <td>${info.count}</td>
                        <td>${percentage}%</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        // 页面加载时获取数据
        window.addEventListener('DOMContentLoaded', loadResults);
    </script>
</body>
</html>
